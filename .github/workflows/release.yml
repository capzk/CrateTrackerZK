name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Resolve and Validate Version
      id: get_version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME}"
        TOC_VERSION=$(grep -E "^## Version:" CrateTrackerZK.toc | sed 's/## Version: //' | tr -d ' ')

        if [ -z "${TAG_VERSION}" ]; then
          echo "Tag version is empty."
          exit 1
        fi

        if [ "${TAG_VERSION}" != "${TOC_VERSION}" ]; then
          echo "Version mismatch: tag=${TAG_VERSION}, toc=${TOC_VERSION}"
          exit 1
        fi

        echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
        echo "Validated version: ${TAG_VERSION}"

    - name: Cleanup workspace
      run: |
        rm -rf "release_temp"
        rm -f "CrateTrackerZK.zip"
        rm -f "CrateTrackerZK-"*.zip

    - name: Ensure Release Does Not Already Exist
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const tag = '${{ steps.get_version.outputs.version }}';
          const existingRelease = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
            .then(res => res.data)
            .catch(err => {
              if (err.status !== 404) throw err;
              return null;
            });

          if (existingRelease) {
            core.setFailed(`Release already exists for tag ${tag}. Refusing to overwrite immutable release.`);
            return;
          }

          core.info(`Release for ${tag} does not exist. Safe to publish.`);

    - name: Build package
      run: |
        mkdir -p release_temp/CrateTrackerZK
        rsync -av --exclude='.git' --exclude='.github' --exclude='.gitignore' --exclude='.gitattributes' \
          --exclude='PERFORMANCE_ANALYSIS.md' --exclude='CHANGELOG.md' \
          --exclude='release_temp' --exclude='CrateTrackerZK.zip' \
          ./ release_temp/CrateTrackerZK/
        cd release_temp && zip -r ../CrateTrackerZK.zip CrateTrackerZK/
    
    - name: Rename package
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        mv CrateTrackerZK.zip "CrateTrackerZK-${VERSION}.zip"

    - name: Generate SHA256
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        sha256sum "CrateTrackerZK-${VERSION}.zip" > "CrateTrackerZK-${VERSION}.zip.sha256"
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          CrateTrackerZK-${{ steps.get_version.outputs.version }}.zip
          CrateTrackerZK-${{ steps.get_version.outputs.version }}.zip.sha256
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        body: |
          ## CrateTrackerZK ${{ steps.get_version.outputs.version }}
          
          ### Installation
          1. Download `CrateTrackerZK-${{ steps.get_version.outputs.version }}.zip`
          2. Extract the zip file
          3. Copy the `CrateTrackerZK` folder to your `World of Warcraft/_retail_/Interface/AddOns/` directory
          4. Restart the game or use `/reload` command
          
          ### Integrity
          Verify package checksum using:
          `sha256sum -c CrateTrackerZK-${{ steps.get_version.outputs.version }}.zip.sha256`
        draft: false
        prerelease: false
        overwrite: false
        make_latest: true
